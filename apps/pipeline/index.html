<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Ad Lifeline Pipeline</title>
    <style>
      body { margin: 0; background: #0a0a0f; }
      #app-fallback {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #888; font-size: 13px; text-align: center; padding: 20px;
      }
      #app-fallback .fb-card {
        background: #13131a; border: 1px solid #23232f; border-radius: 16px;
        padding: 36px 32px; max-width: 420px; width: 100%;
      }
      #app-fallback h2 { color: #e2e2e8; font-size: 18px; margin: 0 0 8px; }
      #app-fallback p { margin: 0 0 16px; line-height: 1.6; }
      #app-fallback button {
        padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
        font-size: 13px; font-weight: 600; margin: 4px;
      }
      #app-fallback .btn-primary { background: #6366f1; color: #fff; }
      #app-fallback .btn-ghost { background: #23232f; color: #ccc; border: 1px solid #33333f; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-fallback" style="display:none">
      <div class="fb-card">
        <h2>Something went wrong</h2>
        <p id="fallback-msg">The app failed to load. This can happen if you clicked an expired invite link or have cached data from a previous session.</p>
        <pre id="fallback-debug" style="text-align:left;font-size:10px;color:#f87171;background:#1a1a24;padding:12px;border-radius:8px;margin:12px 0;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;display:none"></pre>
        <div>
          <button class="btn-primary" onclick="localStorage.clear();sessionStorage.clear();if(caches){caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})})};setTimeout(function(){window.location.replace(window.location.origin)},200)">Clear Cache & Go to Login</button>
          <button class="btn-ghost" onclick="window.location.replace(window.location.origin)">Go to Login</button>
          <button class="btn-ghost" onclick="var d=document.getElementById('fallback-debug');d.style.display=d.style.display==='none'?'block':'none'">Show Error Details</button>
        </div>
      </div>
    </div>
    <script>
      (function() {
        // Strip error hashes from Supabase redirects
        var h = window.location.hash;
        if (h && h.indexOf('error=') !== -1) {
          window.history.replaceState(null, '', window.location.pathname);
        }

        // Detect and fix corrupted Supabase auth tokens in localStorage
        // This is the #1 cause of Chrome white-page crashes
        try {
          var keys = Object.keys(localStorage);
          for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            if (k.indexOf('supabase') !== -1 || k.indexOf('sb-') !== -1) {
              try {
                var v = localStorage.getItem(k);
                if (v && v.charAt(0) === '{') JSON.parse(v);
              } catch (parseErr) {
                console.warn('Removing corrupted auth key:', k);
                localStorage.removeItem(k);
              }
            }
          }
        } catch (e) { /* ignore */ }

        // Track loading stages
        window.__appMounted = false;
        window.__loadStage = 'html-parsed';
        window.__loadTimeline = ['[' + new Date().toISOString() + '] HTML parsed'];
        window.trackStage = trackStage;

        function trackStage(stage) {
          window.__loadStage = stage;
          window.__loadTimeline.push('[' + new Date().toISOString() + '] ' + stage);
        }

        // Show fallback if React doesn't mount within 10 seconds
        setTimeout(function() {
          if (!window.__appMounted) {
            document.getElementById('app-fallback').style.display = 'flex';
            var dbg = document.getElementById('fallback-debug');
            var lsKeys = [];
            try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); lsKeys.push(k); } } catch(e) {}

            var blocked = window.__loadStage === 'html-parsed';
            var diagnosis = blocked
              ? 'LIKELY CAUSE: Script blocked by ad blocker or browser extension.\n\n'
                + 'FIX: Disable your ad blocker for this site, or try incognito with extensions disabled.'
              : 'The app started loading but got stuck at: ' + window.__loadStage;

            if (dbg) {
              dbg.style.display = 'block';
              dbg.textContent = 'ERROR CODE: ' + (blocked ? 'SCRIPT_BLOCKED' : 'MOUNT_TIMEOUT') + '\n\n'
                + diagnosis + '\n\n'
                + 'Timeline:\n' + window.__loadTimeline.join('\n') + '\n\n'
                + 'URL: ' + window.location.href + '\n'
                + 'UserAgent: ' + navigator.userAgent.substring(0, 120) + '\n'
                + 'localStorage keys (' + lsKeys.length + '): ' + lsKeys.join(', ') + '\n'
                + 'Online: ' + navigator.onLine + '\n'
                + 'Errors: ' + window.__errorLog.length + '\n'
                + 'Time: ' + new Date().toISOString();
            }

            var msg = document.getElementById('fallback-msg');
            if (msg && blocked) {
              msg.textContent = 'Your ad blocker or browser extension is blocking this app from loading. Please disable it for this site, or open in incognito mode with extensions disabled.';
            }
          }
        }, 10000);
      })();

      window.__errorLog = [];
      function logErr(type, detail) {
        var entry = '[' + type + '] ' + detail;
        window.__errorLog.push(entry);
        var dbg = document.getElementById('fallback-debug');
        if (dbg) {
          // Collect diagnostic info
          var lsKeys = [];
          try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); lsKeys.push(k + '=' + (localStorage.getItem(k) || '').substring(0, 60)); } } catch(e) {}
          dbg.textContent = 'ERROR CODE: CHROME_INIT_FAIL\n\n'
            + 'Errors:\n' + window.__errorLog.join('\n') + '\n\n'
            + 'URL: ' + window.location.href + '\n'
            + 'Hash: ' + window.location.hash + '\n'
            + 'UserAgent: ' + navigator.userAgent.substring(0, 100) + '\n'
            + 'localStorage keys: ' + lsKeys.join(', ') + '\n'
            + 'Time: ' + new Date().toISOString();
        }
      }

      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error || e.message);
        var detail = (e.message || 'Unknown') + ' at ' + (e.filename || '?') + ':' + (e.lineno || '?');
        if (e.error && e.error.stack) detail += '\nStack: ' + e.error.stack.substring(0, 300);
        logErr('JS', detail);
        if (!window.__appMounted) {
          document.getElementById('app-fallback').style.display = 'flex';
          var msg = document.getElementById('fallback-msg');
          if (msg) msg.textContent = 'App crashed. Click "Show Error Details" and send a screenshot to your admin.';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
        var detail = e.reason ? (e.reason.message || e.reason.toString()).substring(0, 300) : 'Unknown promise rejection';
        if (e.reason && e.reason.stack) detail += '\nStack: ' + e.reason.stack.substring(0, 300);
        logErr('PROMISE', detail);
        if (!window.__appMounted) {
          document.getElementById('app-fallback').style.display = 'flex';
          var msg = document.getElementById('fallback-msg');
          if (msg) msg.textContent = 'App crashed. Click "Show Error Details" and send a screenshot to your admin.';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
